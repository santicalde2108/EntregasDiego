<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Color Aleatorio</title>
  <style>
    body {
      text-align: center;
      padding: 60px;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    #caja {
      width: 250px;
      height: 250px;
      margin: 0 auto;
      background-color: #000000;
      border: 2px solid #000;

      /* Para centrar el contenido dentro */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    #etiqueta {
      font-size: 22px;
      color: white;
      margin: 0;
    }

    button {
      padding: 10px 24px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="caja">
    <p id="etiqueta">#000000</p>
    <button onclick="cambiarColor()">Generar color</button>
  </div>

  <script>
    function cambiarColor() {
      var color = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');

      document.getElementById('caja').style.backgroundColor = color;
      document.body.style.backgroundColor = color;

      document.getElementById('etiqueta').textContent = color;
    }
  </script>

</body>
</html>
